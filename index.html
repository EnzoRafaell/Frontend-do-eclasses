<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Classes Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>E-Classes</h1>
    <p>Gerenciador de Interclasses</p>
</header>

<nav class="menu">
    <button onclick="abrirAba('dashboard')">Dashboard</button>
    <button onclick="abrirAba('jogadores')">Jogadores</button>
    <button onclick="abrirAba('times')">Times</button>
    <button onclick="abrirAba('modalidades')">Modalidades</button>
    <button onclick="abrirAba('confrontos')">Confrontos</button>
</nav>

<main>

    <!-- DASHBOARD -->
    <section id="dashboard" class="aba ativa">

        <h2>Dashboard</h2>

        <div class="cards-dashboard">

            <div class="dashboard-card">
                <h3>Jogadores</h3>
                <span id="totalJogadores">0</span>
            </div>

            <div class="dashboard-card">
                <h3>Times</h3>
                <span id="totalTimes">0</span>
            </div>

            <div class="dashboard-card">
                <h3>Modalidades</h3>
                <span id="totalModalidades">0</span>
            </div>

            <div class="dashboard-card">
                <h3>Confrontos</h3>
                <span id="totalConfrontos">0</span>
            </div>

        </div>

    </section>

    <!-- JOGADORES -->
    <section id="jogadores" class="aba">

        <h2>Cadastro de Jogadores</h2>

        <div class="formulario">

            <input type="text" id="nomeJogador" placeholder="Nome">

            <input type="text" id="turmaJogador" placeholder="Turma">

            <input type="email" id="emailJogador" placeholder="Email">

            <input type="number" id="timeJogador" placeholder="ID do Time">

            <button onclick="cadastrarJogador()">
                Cadastrar Jogador
            </button>

        </div>

        <div id="listaJogadores" class="lista"></div>

    </section>

    <!-- TIMES -->
    <section id="times" class="aba">

        <h2>Cadastro de Times</h2>

        <div class="formulario">

            <input type="text" id="nomeTime" placeholder="Nome do Time">

            <input type="text" id="turmaTime" placeholder="Turma">

            <input type="color" id="corTime">

            <button onclick="cadastrarTime()">
                Cadastrar Time
            </button>

        </div>

        <div id="listaTimes" class="lista"></div>

    </section>

    <!-- MODALIDADES -->
    <section id="modalidades" class="aba">

        <h2>Cadastro de Modalidades</h2>

        <div class="formulario">

            <input type="text"
                   id="nomeModalidade"
                   placeholder="Nome">

            <input type="text"
                   id="descricaoModalidade"
                   placeholder="Descrição">

            <input type="number"
                   id="pontuacaoModalidade"
                   placeholder="Pontuação">

            <button onclick="cadastrarModalidade()">
                Cadastrar Modalidade
            </button>

        </div>

        <div id="listaModalidades" class="lista"></div>

    </section>

    <!-- CONFRONTOS -->
    <section id="confrontos" class="aba">

        <h2>Cadastro de Confrontos</h2>

        <div class="formulario">

            <input type="number"
                   id="timeCasa"
                   placeholder="ID Time Casa">

            <input type="number"
                   id="timeVisitante"
                   placeholder="ID Time Visitante">

            <input type="number"
                   id="modalidadeConfronto"
                   placeholder="ID Modalidade">

            <input type="date"
                   id="dataConfronto">

            <button onclick="cadastrarConfronto()">
                Cadastrar Confronto
            </button>

        </div>

        <div id="listaConfrontos" class="lista"></div>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
